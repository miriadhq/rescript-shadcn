name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: yarn

      - name: yarn build
        run: yarn build

      - name: check docs links
        run: yarn test:docs

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: yarn

      - name: Generate DemoLoader
        run: yarn loader:generate

      - name: Compile ReScript
        run: yarn rescript

      - name: Run visual tests
        run: yarn test:visual
